services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - "/data/db/nmopgdata:/var/lib/postgresql/data/pgdata"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
  nmocore:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8002:8002
    depends_on:
      - db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
  cache:
    image: redis/redis-stack-server:latest
    restart: always
    #ports:
    #  - 6379:6379
    command: redis-stack-server 
    environment:
      REDIS_ARGS: "--appendonly yes --protected-mode no --io-threads 12 --io-threads-do-reads yes --maxmemory-policy allkeys-lru --maxmemory 4294967296"
      REDISEARCH_ARGS: "MAXSEARCHRESULTS -1"