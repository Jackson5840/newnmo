server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file downloads (getzipped, etc.)
    client_max_body_size 50m;

    # Reverse proxy: frontend calls /api/... -> FastAPI at nmocore:8002/...
    location /api/ {
        proxy_pass http://nmocore:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static site: serve *.html without extension, fall back to index
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Long cache for hashed static assets (js/css/assets)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }
}
